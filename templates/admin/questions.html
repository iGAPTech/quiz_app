{% include "admin/header.html" %}

<div class="page-wrapper">
    <div class="container-fluid">

        <div class="card">
            <div class="card-body">

                <div class="row">
                    <div class="col-lg-8">
                        <h4 class="card-title">
                            Questions - {{ quiz.title }}
                        </h4>
                    </div>

                    <div class="col-lg-4 text-right">
                        <button class="btn btn-primary mb-3"
                                data-toggle="modal"
                                data-target="#addQuestionModal">
                            + Add Question
                        </button>
                    </div>
                </div>

                <!-- Questions Table -->
                <div class="table-responsive">
                    <table class="table table-bordered table-striped text-dark">

                        <thead>
                            <tr class="bg-primary text-white">
                                <th>ID</th>
                                <th>Question</th>
                                <th>Correct</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody>
                            {% for q in questions %}
                            <tr>
                                <td>{{ loop.index }}</td>
                                <td>{{ q.question_text }}</td>
                                <td>{{ q.correct_option }}</td>
                                <td>
                                    <button class="btn btn-sm btn-warning"
                                            data-toggle="modal"
                                            data-target="#editModal{{ q.id }}">
                                        Edit
                                    </button>

                                    <a href="/admin/questions/delete/{{ q.id }}/{{ quiz.id }}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Delete question?')">
                                       Delete
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>

                    </table>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- ADD QUESTION MODAL -->
<div class="modal fade" id="addQuestionModal">
    <div class="modal-dialog">
        <form method="post" action="/admin/questions/add/{{ quiz.id }}">
            <div class="modal-content">

                <div class="modal-header bg-primary text-white">
                    <h5>Add Question</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>

                <div class="modal-body">
                    <textarea name="question_text" class="form-control mb-2" placeholder="Question" required></textarea>

                    <input type="text" name="option_a" class="form-control mb-2" placeholder="Option A" required>
                    <input type="text" name="option_b" class="form-control mb-2" placeholder="Option B" required>
                    <input type="text" name="option_c" class="form-control mb-2" placeholder="Option C" required>
                    <input type="text" name="option_d" class="form-control mb-2" placeholder="Option D" required>

                    <label>Correct Option</label>
                    <select name="correct_option" class="form-control">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success">Save</button>
                </div>

            </div>
        </form>
    </div>
</div>

<!-- EDIT MODALS -->
{% for q in questions %}
<div class="modal fade" id="editModal{{ q.id }}">
    <div class="modal-dialog">
        <form method="post" action="/admin/questions/update/{{ q.id }}/{{ quiz.id }}">
            <div class="modal-content">

                <div class="modal-header bg-primary text-white">
                    <h5>Edit Question</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>

                <div class="modal-body">
                    <textarea name="question_text" class="form-control mb-2" required>{{ q.question_text }}</textarea>

                    <input type="text" name="option_a" class="form-control mb-2" value="{{ q.option_a }}" required>
                    <input type="text" name="option_b" class="form-control mb-2" value="{{ q.option_b }}" required>
                    <input type="text" name="option_c" class="form-control mb-2" value="{{ q.option_c }}" required>
                    <input type="text" name="option_d" class="form-control mb-2" value="{{ q.option_d }}" required>

                    <select name="correct_option" class="form-control">
                        <option value="A" {% if q.correct_option=='A' %}selected{% endif %}>A</option>
                        <option value="B" {% if q.correct_option=='B' %}selected{% endif %}>B</option>
                        <option value="C" {% if q.correct_option=='C' %}selected{% endif %}>C</option>
                        <option value="D" {% if q.correct_option=='D' %}selected{% endif %}>D</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary">Update</button>
                </div>

            </div>
        </form>
    </div>
</div>
{% endfor %}

{% include "admin/footer.html" %}
