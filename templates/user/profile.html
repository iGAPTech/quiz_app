{% include "user/header.html" %}

<div class="page-wrapper">
<div class="container-fluid">

<div class="card">
<div class="card-body">

<h4 class="card-title">My Profile</h4>

<table class="table table-bordered mt-3">
    <tr>
        <th>User ID</th>
        <td>{{ user.id }}</td>
    </tr>
    <tr>
        <th>Name</th>
        <td>{{ user.name }}</td>
    </tr>
    <tr>
        <th>Email</th>
        <td>{{ user.email }}</td>
    </tr>
    <tr>
        <th>Role</th>
        <td>{{ user.role }}</td>
    </tr>
    <tr>
        <th>Joined On</th>
        <td>{{ user.created_at }}</td>
    </tr>
</table>

<hr>

<h5>Performance</h5>

<div class="row">
    <div class="col-md-4">
        <div class="alert alert-info">
            Total Attempts: <b>{{ total_attempts }}</b>
        </div>
    </div>

    <div class="col-md-4">
        <div class="alert alert-success">
            Best Score: <b>{{ best_score if best_score else 0 }}</b>
        </div>
    </div>
</div>

</div>
</div>

</div>
</div>

{% include "user/footer.html" %}
