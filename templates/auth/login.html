<!DOCTYPE html>
<html dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Tell the browser to be responsive to screen width -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <!-- Favicon icon -->
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/images/favicon.png">
    <title>Interactive Quiz App</title>
    <!-- Custom CSS -->
    <link href="../../dist/css/style.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/assets/dist/css/style.min.css">

    <style>
        .bg-img{
            background-image: url('../../static/assets/bg.jpg');
            background-position: center;
        }
    </style>
</head>

<body>
    <div class="main-wrapper bg-img">
        
        <div class="auth-wrapper d-flex no-block justify-content-center align-items-center rounded">
            <div class="auth-box">
                <div id="loginform">
                    <div class="logo">
                        <span class="db">
                            <img src="../../static/assets/icon.png" style="height: 90px;" alt="logo">
                        </span>
                        <h5 class="font-medium m-b-20">Sign In to Quiz App</h5>
                    </div>
                    <!-- Form -->
                    <div class="row">
                        <div class="col-12">
                            <form class="form-horizontal m-t-20" id="loginform" action="/" method="post">
                                <div class="input-group mb-3">
                                    <div class="input-group-prepend">
                                        <span class="input-group-text" id="basic-addon1"><i class="ti-user"></i></span>
                                    </div>
                                    <input type="text" name="email" class="form-control form-control-lg" placeholder="Email" aria-label="Username" aria-describedby="basic-addon1">
                                </div>
                                <div class="input-group mb-3">
                                    <div class="input-group-prepend">
                                        <span class="input-group-text" id="basic-addon2"><i class="ti-pencil"></i></span>
                                    </div>
                                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" aria-label="Password" aria-describedby="basic-addon1">
                                </div>

                                {% with messages = get_flashed_messages(with_categories=true) %}
                                {% if messages %}
                                    {% for category, msg in messages %}
                                        <div class="alert alert-{{ category }}">{{ msg }}</div>
                                    {% endfor %}
                                {% endif %}
                                {% endwith %}
                                
                                <div class="form-group text-center">
                                    <div class="col-xs-12 p-b-20">
                                        <button class="btn btn-block btn-lg btn-info" type="submit">Log In</button>
                                    </div>
                                </div>
                                
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- ============================================================== -->
    <!-- All Required js -->
    <!-- ============================================================== -->
    <script src="../../static/assets/libs/jquery/dist/jquery.min.js"></script>
    <script src="../../static/assets/libs/popper.js/dist/umd/popper.min.js"></script>
    <script src="../../static/assets/libs/bootstrap/dist/js/bootstrap.min.js"></script>
    <!-- Bootstrap tether Core JavaScript -->
    
    
</body>

</html>
